<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Daily Mail{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

</html>
